block parser app-commvault_commcell() {
    channel {
        rewrite {
            # Work on a temporary copy only. Keep original MESSAGE intact for sourcetype detection.
            set("${MESSAGE}", value(".tmp.commvault_kv"));

            # Remove Commvault record prefix:
            #   Events:
            #   Event:
            #   Alerts:
            #   Alert:
            #   AuditTrail:
            subst("^(AuditTrail|Alerts?|Events?):[[:space:]]*", "", value(".tmp.commvault_kv"));

            # Convert:
            #   Key = {Value}
            # into:
            #   Key=Value}
            #
            # Important: replacement must be "=" only, not "={", otherwise values keep leading "{"
            subst("[[:space:]]*=[[:space:]]*[{]", "=", value(".tmp.commvault_kv"), flags("global"));

            # Clean spacing before/after closing braces
            subst("[[:space:]]+[}]", "}", value(".tmp.commvault_kv"), flags("global"));
            subst("[}][[:space:]]+", "}", value(".tmp.commvault_kv"), flags("global"));
        };

        parser {
            kv-parser(
                prefix(".values.")
                pair-separator("}")
                value-separator("=")
                template("${.tmp.commvault_kv}")
            );
        };

        # Prefer Unix epoch timestamp if present
        if (match("^[0-9]{10}$" value(".values.Utctimestamp") type(pcre))) {
            parser {
                date-parser-nofilter(
                    format("%s")
                    template("${.values.Utctimestamp}")
                );
            };
        } elif (match("^." value(".values.Occurrencetime") type(pcre))) {
            parser {
                date-parser-nofilter(
                    format("%d %b %Y %H:%M:%S")
                    template("${.values.Occurrencetime}")
                );
            };
        } elif (match("^." value(".values.Alerttime") type(pcre))) {
            parser {
                date-parser-nofilter(
                    format("%d %b %Y %H:%M:%S")
                    template("${.values.Alerttime}")
                );
            };
        } elif (match("^." value(".values.Audittime") type(pcre))) {
            parser {
                date-parser-nofilter(
                    format("%d %b %Y %H:%M:%S")
                    template("${.values.Audittime}")
                );
            };
        };

        # Base destination metadata
        rewrite {
            r_set_splunk_dest_default(
                index("commvault")
                sourcetype("commvault:commcell")
                vendor("commvault")
                product("commcell")
                source("commvault_commcell")
                template("t_json_values_msg")
            );
        };
# Sourcetype split: AuditTrail / Alert(s) / Event(s)
        if (
            message("^AuditTrail:" type(pcre))
            or match("^." value(".values.Opid") type(pcre))
        ) {
            rewrite {
                r_set_splunk_dest_update_v2(
                    sourcetype("commvault:commcell:audittrail")
                );
            };
        } elif (
            message("^Alerts?:" type(pcre))
            or match("^." value(".values.Alertid") type(pcre))
        ) {
            rewrite {
                r_set_splunk_dest_update_v2(
                    sourcetype("commvault:commcell:alerts")
                );
            };
        } elif (
            message("^Events?:" type(pcre))
            or match("^." value(".values.Eventid") type(pcre))
        ) {
            rewrite {
                r_set_splunk_dest_update_v2(
                    sourcetype("commvault:commcell:events")
                );
            };
        };
    };
};


application app-netsource-commvault_commcell[sc4s-network-source] {
    filter {
        not filter(f_is_source_identified)
        and (
            (
                match("commvault" value(".netsource.sc4s_vendor") type(string) flags(ignore-case))
                and match("commcell" value(".netsource.sc4s_product") type(string) flags(ignore-case))
            )
            or (
                tags("ns_vendor:commvault")
                and tags("ns_product:commcell")
            )
            or tags(".source.s_COMMVAULT_COMMCELL")
            or tags("source.s_COMMVAULT_COMMCELL")
            or "${.netsource.sc4s_vendor_product}" eq "commvault_commcell"
            or "${SOURCE}" eq "s_COMMVAULT_COMMCELL"
        )
    };
    parser { app-commvault_commcell(); };
};


# Fallback body matcher for normal syslog parsing path.
# Useful if the network-source metadata does not claim the event for any reason.
application app-syslog-commvault_commcell[sc4s-syslog] {
    filter {
        not filter(f_is_source_identified)
        and (
            message("^(AuditTrail|Alerts?|Events?):" type(pcre))
            or message("^(Opid|Alertid|Eventid)[[:space:]]*=" type(pcre))
            or tags(".source.s_COMMVAULT_COMMCELL")
            or tags("source.s_COMMVAULT_COMMCELL")
            or (
                tags("ns_vendor:commvault")
                and tags("ns_product:commcell")
            )
        )
    };
    parser { app-commvault_commcell(); };
};


