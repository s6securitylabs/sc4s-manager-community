block parser app-pan_panos() {
    channel {
        # PAN-OS syslog payloads are comma-delimited positional records. The
        # official Splunk TA expects the original CSV payload, so this parser
        # only extracts enough fields for safe routing and leaves MESSAGE intact.
        parser {
            csv-parser(
                columns(".values.future_use_1", ".values.receive_time", ".values.serial_number", ".values.panos_type", ".values.panos_subtype", ".values.future_use_2", ".values.generated_time")
                delimiters(",")
                flags(greedy)
                template("${MESSAGE}")
            );
        };

        if (match("^[0-9]{4}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}$" value(".values.generated_time") type(pcre))) {
            parser { date-parser-nofilter(format("%Y/%m/%d %H:%M:%S") template("${.values.generated_time}")); };
        } elif (match("^[0-9]{4}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}$" value(".values.receive_time") type(pcre))) {
            parser { date-parser-nofilter(format("%Y/%m/%d %H:%M:%S") template("${.values.receive_time}")); };
        };

        rewrite {
            r_set_splunk_dest_default(
                index("netfw")
                sourcetype("pan:log")
                vendor("palo_alto_networks")
                product("pan-os")
                source("pan_panos")
                template("t_msg_only")
            );
        };

        if (match("^TRAFFIC$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message("(^|[[:space:]])[0-9]+,[0-9]{4}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2},[^,]+,TRAFFIC," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:traffic")); };
        } elif (match("^THREAT$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message("(^|[[:space:]])[0-9]+,[0-9]{4}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2},[^,]+,THREAT," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:threat")); };
        } elif (match("^WILDFIRE$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",WILDFIRE," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:wildfire")); };
        } elif (match("^SYSTEM$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",SYSTEM," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:system")); };
        } elif (match("^CONFIG$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",CONFIG," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:config")); };
        } elif (match("^HIPMATCH$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",HIPMATCH," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:hipmatch")); };
        } elif (match("^USERID$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",USERID," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:userid")); };
        } elif (match("^GLOBALPROTECT$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",GLOBALPROTECT," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:globalprotect")); };
        } elif (match("^(AUTHENTICATION|AUTH)$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",(AUTHENTICATION|AUTH)," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:auth")); };
        } elif (match("^DECRYPTION$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",DECRYPTION," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:decryption")); };
        } elif (match("^TUNNEL$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",TUNNEL," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:tunnel")); };
        } elif (match("^CORRELATION$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",CORRELATION," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:correlation")); };
        } elif (match("^IPTAG$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",IPTAG," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:iptag")); };
        } elif (match("^GTP$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",GTP," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:gtp")); };
        } elif (match("^SCTP$" value(".values.panos_type") type(pcre) flags(ignore-case)) or message(",SCTP," type(pcre))) {
            rewrite { r_set_splunk_dest_update_v2(sourcetype("pan:sctp")); };
        };
    };
};

application app-netsource-pan_panos[sc4s-network-source] {
    filter {
        not filter(f_is_source_identified)
        and (
            tags(".source.s_PAN_PANOS")
            or tags("source.s_PAN_PANOS")
            or "${SOURCE}" eq "s_PAN_PANOS"
            or "${.netsource.sc4s_vendor_product}" eq "pan_panos"
            or (
                match("^(pan|palo_alto_networks|paloalto)$" value(".netsource.sc4s_vendor") type(pcre) flags(ignore-case))
                and match("^(panos|pan-os|ngfw|panorama)$" value(".netsource.sc4s_product") type(pcre) flags(ignore-case))
            )
        )
    };
    parser { app-pan_panos(); };
};

application app-syslog-pan_panos[sc4s-syslog] {
    filter {
        not filter(f_is_source_identified)
        and (
            tags(".source.s_PAN_PANOS")
            or tags("source.s_PAN_PANOS")
            or message("(^|[[:space:]])[0-9]+,[0-9]{4}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2},[^,]+,(TRAFFIC|THREAT|WILDFIRE|SYSTEM|CONFIG|HIPMATCH|USERID|GLOBALPROTECT|AUTHENTICATION|AUTH|DECRYPTION|TUNNEL|CORRELATION|IPTAG|GTP|SCTP)," type(pcre))
        )
    };
    parser { app-pan_panos(); };
};

application app-raw-pan_panos[sc4s-raw-syslog] {
    filter {
        not filter(f_is_source_identified)
        and (
            tags(".source.s_PAN_PANOS")
            or tags("source.s_PAN_PANOS")
            or message("(^|[[:space:]])[0-9]+,[0-9]{4}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2},[^,]+,(TRAFFIC|THREAT|WILDFIRE|SYSTEM|CONFIG|HIPMATCH|USERID|GLOBALPROTECT|AUTHENTICATION|AUTH|DECRYPTION|TUNNEL|CORRELATION|IPTAG|GTP|SCTP)," type(pcre))
        )
    };
    parser { app-pan_panos(); };
};
