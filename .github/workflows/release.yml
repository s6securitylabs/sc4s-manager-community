name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v (for manual runs)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION#v}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: scripts/build_frontend.sh

      - name: Build release tarball
        run: python3 scripts/build_release_artifact.py --version "${{ steps.version.outputs.version }}" --output-dir dist/release

      - name: Validate release tarball install dry run
        run: |
          python3 scripts/validate_package_install.py \
            --dry-run \
            --artifact "dist/release/sc4s-manager-${{ steps.version.outputs.version }}.tar.gz" \
            --workdir "${RUNNER_TEMP}/sc4s-manager-package-drill" \
            --evidence-out "dist/release/package-install-dry-run.json"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build Linux standalone binary
        run: python3 scripts/build_binary.py --version "${{ steps.version.outputs.version }}" --output-dir dist/release

      - name: Generate checksums
        working-directory: dist/release
        run: sha256sum * > SHA256SUMS

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TITLE="SC4S Manager $TAG"
          NOTES="Release artifacts:\n- Docker image: \`${IMAGE_NAME}:${{ steps.version.outputs.version }}\`\n- Tarball: \`sc4s-manager-${{ steps.version.outputs.version }}.tar.gz\`\n- Linux binary: \`sc4s-manager-${{ steps.version.outputs.version }}-linux-x86_64\`\n\nValidate checksums with \`SHA256SUMS\`."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/* --clobber
          else
            gh release create "$TAG" dist/release/* --title "$TITLE" --notes "$NOTES"
          fi
